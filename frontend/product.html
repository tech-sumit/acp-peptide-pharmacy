<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Product Detail | ACP Peptide Pharmacy</title>
		<meta
			name="description"
			content="Inspect peptide metadata, purity details, and add a product to the ACP demo cart."
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="./css/styles.css" />
		<script src="./js/config.js" defer></script>
		<script src="./js/app.js" defer></script>
	</head>
	<body data-page="product">
		<div class="page-shell">
			<header class="site-header">
				<a class="brandmark" href="./index.html">
					<span class="brandmark__eyebrow">Research Ordering Demo</span>
					<span class="brandmark__title">ACP Peptide Pharmacy</span>
				</a>
				<nav class="site-nav">
					<a href="./index.html#catalog">Catalog</a>
					<a href="./cart.html" class="nav-cart"
						>Cart <span data-cart-count>0</span></a
					>
				</nav>
			</header>

			<main class="detail-page">
				<a class="back-link" href="./index.html#catalog">Back to catalog</a>
				<section class="detail-hero" data-product-detail></section>
				<section class="detail-recommendations">
					<div class="section-header">
						<div>
							<div class="section-kicker">Suggested pairings</div>
							<h2>Complementary protocols</h2>
						</div>
						<p>Explore adjacent peptides used in similar research tracks.</p>
					</div>
					<div class="product-grid" data-related-products></div>
				</section>
			</main>
		</div>
	</body>
</html>
